name: Update live profile telemetry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - "light.template.svg"
      - "scripts/generate_profile.py"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

concurrency:
  group: update-profile-telemetry
  cancel-in-progress: true

jobs:
  update-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate live Fusion Center
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_profile.py

      - name: Validate generated SVG
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('light.svg'); print('SVG valid')"

      - name: Commit only when telemetry changed
        run: |
          if git diff --quiet -- light.svg data/profile.json; then
            echo "No profile telemetry changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add light.svg data/profile.json
          git commit -m "chore(profile): refresh live telemetry"
          git push
