<svg xmlns="http://www.w3.org/2000/svg"
 width="1400" height="940" viewBox="0 0 1400 940" role="img" aria-labelledby="title desc">
<title id="title">Jay Nagrecha — Cyber Defense Operations</title>
<desc id="desc">A large light-mode cyber defense operations dashboard.</desc>

<defs>
  <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#06B6D4"/>
    <stop offset=".5" stop-color="#10B981"/>
    <stop offset="1" stop-color="#8B5CF6"/>
  </linearGradient>

  <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#06B6D4"/>
    <stop offset=".52" stop-color="#10B981"/>
    <stop offset="1" stop-color="#8B5CF6"/>
  </linearGradient>

  <radialGradient id="radarGlow">
    <stop offset="0" stop-color="#10B981" stop-opacity=".30"/>
    <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
  </radialGradient>

  <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
    <path d="M46 0H0V46" fill="none" stroke="#C9E0EA" stroke-width="1" opacity=".42"/>
  </pattern>

  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#4B6475" flood-opacity=".18"/>
  </filter>

  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    .title { font: 800 26px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#122033; letter-spacing:1.4px; }
    .h { font: 800 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#0891B2; letter-spacing:2.3px; }
    .label { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#6B7C90; letter-spacing:1.4px; }
    .value { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#172033; }
    .small { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#6B7C90; }
    .tiny { font: 600 10px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#728197; letter-spacing:1.2px; }
    .green { fill:#059669; }
    .cyan { fill:#0891B2; }
    .violet { fill:#7C3AED; }
  </style>
</defs>

<rect width="1400" height="940" rx="26" fill="#F7FAFD"/>
<rect width="1400" height="940" rx="26" fill="url(#grid)"/>
<rect x="4" y="4" width="1392" height="932" rx="23" fill="none" stroke="url(#edge)" stroke-width="2.5"/>

<!-- Header -->
<circle cx="34" cy="34" r="6" fill="#FB7185"/>
<circle cx="56" cy="34" r="6" fill="#FBBF24"/>
<circle cx="78" cy="34" r="6" fill="#34D399"/>
<text x="700" y="39" text-anchor="middle" class="tiny">JAY NAGRECHA // CYBER DEFENSE OPERATIONS // SECURE SESSION</text>
<circle cx="1304" cy="34" r="5" fill="#10B981" filter="url(#glow)">
  <animate attributeName="opacity" values="1;.25;1" dur="1.2s" repeatCount="indefinite"/>
</circle>
<text x="1322" y="39" class="h">LIVE</text>
<path d="M28 62H1372" stroke="#BFD9E6"/>

<!-- Left identity panel -->
<rect x="30" y="84" width="398" height="590" rx="20" fill="#FFFFFF" stroke="#BDD8E6" filter="url(#shadow)"/>
<text x="54" y="118" class="h">IDENTITY.CORE // VERIFIED</text>
<path d="M54 132H404" stroke="#C6DCE7"/>

<g transform="translate(229 304)">
  <circle r="130" fill="none" stroke="#BFD9E6"/>
  <circle r="98" fill="none" stroke="#BFD9E6"/>
  <circle r="66" fill="none" stroke="#BFD9E6"/>
  <path d="M-130 0H130M0-130V130M-92-92L92 92M92-92L-92 92" stroke="#C5DDE8"/>
  <path d="M0 0 L130 0 A130 130 0 0 1 82 99 Z" fill="url(#radarGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4.5s" repeatCount="indefinite"/>
  </path>
  <circle cx="-76" cy="-38" r="5" fill="#06B6D4" filter="url(#glow)">
    <animate attributeName="opacity" values=".2;1;.2" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="88" cy="-21" r="5" fill="#10B981" filter="url(#glow)">
    <animate attributeName="opacity" values="1;.2;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="51" cy="86" r="5" fill="#8B5CF6" filter="url(#glow)">
    <animate attributeName="opacity" values=".2;1;.2" dur="3.1s" repeatCount="indefinite"/>
  </circle>

  <path d="M0-72 68-40V24C68 77 33 106 0 122-33 106-68 77-68 24V-40Z"
        fill="#F2F7FB" stroke="url(#edge)" stroke-width="3" filter="url(#glow)"/>
  <text x="0" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="56" fill="#172033">JN</text>
</g>

<text x="229" y="492" text-anchor="middle" class="title">JAY NAGRECHA</text>
<text x="229" y="525" text-anchor="middle" class="h">CYBER DEFENSE • PURPLE TEAM • BUILDER</text>

<rect x="54" y="558" width="350" height="90" rx="13" fill="#F2F8FB" stroke="#C5DDE8"/>
<text x="72" y="586" class="label">OPERATOR DIRECTIVE</text>
<text x="72" y="616" class="value">BUILD WHAT DOES NOT EXIST.</text>
<text x="72" y="640" class="small green">DETECT • HUNT • VALIDATE • AUTOMATE</text>

<!-- Main profile panel -->
<rect x="452" y="84" width="918" height="590" rx="20" fill="#FFFFFF" stroke="#BDD8E6" filter="url(#shadow)"/>
<text x="478" y="118" class="h">DEFENSE.INTELLIGENCE // OPERATOR JN-01</text>
<path d="M478 132H1344" stroke="#C6DCE7"/>

<text x="478" y="170" class="label">SUBJECT</text>
<text x="640" y="170" class="value">Jay Nagrecha</text>

<text x="478" y="208" class="label">ROLE</text>
<text x="640" y="208" class="value">Cyber Defense &amp; Purple Team Analyst</text>

<text x="478" y="246" class="label">FOCUS</text>
<text x="640" y="246" class="value">Detection Engineering • Threat Hunting • OSINT</text>

<text x="478" y="284" class="label">STATUS</text>
<text x="640" y="284" class="value green">BUILDING • TESTING • DETECTING • SHIPPING</text>

<text x="478" y="334" class="h violet">OPERATING MODES</text>
<path d="M478 348H1344" stroke="#C6DCE7"/>

<g>
  <text x="478" y="388" class="label">DETECTION</text>
  <rect x="640" y="376" width="300" height="10" rx="5" fill="#D9EAF2"/>
  <rect x="640" y="376" width="276" height="10" rx="5" fill="url(#bar)"/>
  <text x="970" y="389" class="value">Sigma • YARA • IOC Correlation</text>

  <text x="478" y="432" class="label">VALIDATION</text>
  <rect x="640" y="420" width="300" height="10" rx="5" fill="#D9EAF2"/>
  <rect x="640" y="420" width="265" height="10" rx="5" fill="url(#bar)"/>
  <text x="970" y="433" class="value">MITRE ATT&amp;CK • SafeBreach • Control Testing</text>

  <text x="478" y="476" class="label">ENDPOINT</text>
  <rect x="640" y="464" width="300" height="10" rx="5" fill="#D9EAF2"/>
  <rect x="640" y="464" width="252" height="10" rx="5" fill="url(#bar)"/>
  <text x="970" y="477" class="value">Microsoft Defender • CrowdStrike • Tanium</text>

  <text x="478" y="520" class="label">AUTOMATION</text>
  <rect x="640" y="508" width="300" height="10" rx="5" fill="#D9EAF2"/>
  <rect x="640" y="508" width="242" height="10" rx="5" fill="url(#bar)"/>
  <text x="970" y="521" class="value">Python • PowerShell • XSOAR • REST APIs</text>

  <text x="478" y="564" class="label">INTELLIGENCE</text>
  <rect x="640" y="552" width="300" height="10" rx="5" fill="#D9EAF2"/>
  <rect x="640" y="552" width="282" height="10" rx="5" fill="url(#bar)"/>
  <text x="970" y="565" class="value">Threat Hunting • OSINT • GitHub Intelligence</text>
</g>

<text x="478" y="612" class="h green">PROJECT INDEX // CLICKABLE MODULES BELOW</text>
<path d="M478 624H1344" stroke="#C6DCE7"/>

<rect x="478" y="640" width="866" height="58" rx="11" fill="#F2F8FB" stroke="#C5DDE8"/>
<circle cx="500" cy="669" r="5" fill="#10B981"/>
<text x="520" y="674" class="value">Open the interactive project cards directly beneath this dashboard.</text>

<!-- Larger lower section -->
<rect x="30" y="704" width="1340" height="206" rx="20" fill="#FFFFFF" stroke="#BDD8E6" filter="url(#shadow)"/>
<text x="54" y="738" class="h">INTELLIGENCE.FEED // OPERATIONAL TELEMETRY</text>
<path d="M54 752H1346" stroke="#C6DCE7"/>

<circle cx="62" cy="790" r="5" fill="#10B981"/>
<text x="82" y="795" class="value">[READY] Defense operations console initialized.</text>

<circle cx="62" cy="834" r="5" fill="#06B6D4"/>
<text x="82" y="839" class="value">[SYNC ] RepoTrace intelligence pipeline connected.</text>

<circle cx="62" cy="878" r="5" fill="#8B5CF6"/>
<text x="82" y="883" class="value">[HUNT ] Signal correlation active. Noise suppression enabled.</text>

<text x="860" y="795" class="label">SYSTEM</text>
<text x="960" y="795" class="value green">NOMINAL</text>

<text x="860" y="839" class="label">MISSION</text>
<text x="960" y="839" class="value">BUILD WHAT DOES NOT EXIST</text>

<text x="860" y="883" class="label">SHELL</text>
<text x="960" y="883" class="value cyan">root@defense-grid:~$</text>

<rect x="1240" y="868" width="9" height="17" fill="#0891B2">
  <animate attributeName="opacity" values="1;0;1" dur=".8s" repeatCount="indefinite"/>
</rect>

<!-- Extended secure boot overlay: ~9 seconds -->
<g id="secure-boot" opacity="1">
  <animate attributeName="opacity"
           values="1;1;0"
           keyTimes="0;0.90;1"
           dur="9s"
           fill="freeze"/>

  <rect x="0" y="0" width="1400" height="940" rx="26" fill="#F7FAFD"/>
  <rect x="0" y="0" width="1400" height="940" rx="26" fill="url(#grid)"/>
  <rect x="4" y="4" width="1392" height="932" rx="23"
        fill="none" stroke="url(#edge)" stroke-width="2.5"/>

  <circle cx="34" cy="34" r="6" fill="#FB7185"/>
  <circle cx="56" cy="34" r="6" fill="#FBBF24"/>
  <circle cx="78" cy="34" r="6" fill="#34D399"/>
  <text x="700" y="39" text-anchor="middle" class="tiny">
    JAY NAGRECHA // CYBER DEFENSE OPERATIONS // SECURE BOOT
  </text>

  <rect x="240" y="132" width="920" height="666" rx="22"
        fill="#FFFFFF" stroke="#BDD8E6" filter="url(#shadow)"/>

  <text x="700" y="192" text-anchor="middle" class="h">
    DEFENSE GRID INITIALIZATION
  </text>
  <text x="700" y="228" text-anchor="middle" class="small">
    Authenticating operator and loading defensive capabilities
  </text>
  <path d="M300 254H1100" stroke="#C6DCE7"/>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".35s" begin=".7s" fill="freeze"/>
    <text x="318" y="304" class="label">[01] OPERATOR IDENTITY</text>
    <text x="1080" y="304" text-anchor="end" class="value green">VERIFIED</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".35s" begin="1.7s" fill="freeze"/>
    <text x="318" y="354" class="label">[02] DETECTION ENGINE</text>
    <text x="1080" y="354" text-anchor="end" class="value green">ONLINE</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".35s" begin="2.7s" fill="freeze"/>
    <text x="318" y="404" class="label">[03] THREAT INTELLIGENCE</text>
    <text x="1080" y="404" text-anchor="end" class="value green">SYNCHRONIZED</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".35s" begin="3.7s" fill="freeze"/>
    <text x="318" y="454" class="label">[04] CONTROL VALIDATION</text>
    <text x="1080" y="454" text-anchor="end" class="value green">READY</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".35s" begin="4.7s" fill="freeze"/>
    <text x="318" y="504" class="label">[05] AUTOMATION PIPELINE</text>
    <text x="1080" y="504" text-anchor="end" class="value green">CONNECTED</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".35s" begin="5.7s" fill="freeze"/>
    <text x="318" y="554" class="label">[06] PROJECT INDEX</text>
    <text x="1080" y="554" text-anchor="end" class="value green">MOUNTED</text>
  </g>

  <rect x="318" y="612" width="764" height="12" rx="6" fill="#D9EAF2"/>
  <rect x="318" y="612" width="0" height="12" rx="6" fill="url(#bar)">
    <animate attributeName="width"
             values="0;110;250;390;530;650;764"
             keyTimes="0;.16;.34;.52;.70;.86;1"
             dur="6.8s"
             begin=".5s"
             fill="freeze"/>
  </rect>

  <text x="700" y="662" text-anchor="middle" class="small">
    Loading analyst workspace...
  </text>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".4s" begin="7.1s" fill="freeze"/>
    <text x="700" y="716" text-anchor="middle" class="title">ACCESS GRANTED</text>
    <text x="700" y="752" text-anchor="middle" class="h green">
      DEFENSE OPERATIONS CONSOLE READY
    </text>
  </g>

  <rect x="694" y="770" width="12" height="22" fill="#0891B2" opacity="0">
    <animate attributeName="opacity"
             values="0;1;0;1;0;1"
             dur="1.2s"
             begin="7.2s"
             repeatCount="indefinite"/>
  </rect>
</g>

</svg>